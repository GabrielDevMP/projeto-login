<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
    rel="stylesheet">

  
   

</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
             <!--aqui vai as imagens-->
            </div>

            <div id="formulário">
                <h1>login</h1>
                <p>Seja Bem vendio(a) novamente. Faça login para acessar sua conta e poder fazer as configurções no seu ambiemte.</p>

                <form action="login.php" method="post" autocomplete="on">

                    <div class="campo">
                        <span class="material-icons">person</span>  
                        <input type="email" name="login" id="ilogin" placeholder="seu email" required autocomplete="email" maxlength="30">
                        <label for="ilogin">login</label> 

                    </div>

                    <div class="campo">
                        <span class="material-icons">key</span>
                        <input type="password" name="senha" id="isenha" placeholder="sua senha" required autocomplete="current-password" minlength="8" maxlength="8">
                         <label for="isenha">senha</label>
                    </div>

                   <div>
                    <input type="submit" value="entrar">
                     <a href="esqueci.html">Esqueci a senha
                        <i class="material-icons">mail</i>

                     </a>
                   </div>

                </form>
            </div>

        </section>

    </main>
</body>
</html>
